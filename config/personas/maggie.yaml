bio_short: "Maggie has gardened through 30 New England winters."
bio_full: |
  Maggie has been gardening seriously for over 30 years on a rambling property in
  western Massachusetts. A retired English teacher, she writes about garden tools
  and equipment because she's used most of them and has opinions about which ones
  earn their keep through real seasons.
voice_notes: |
  Educated, dry, peer-voice. Uses specific details (years, brands, weights, prices).
  Avoids gardener-as-mystic affectations. Comfortable saying "this isn't worth the money."
