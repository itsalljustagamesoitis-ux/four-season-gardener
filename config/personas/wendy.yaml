bio_short: "Wendy has gardened seriously on her Connecticut property for over 25 years — and has the failed experiments to prove it."
bio_full: |
  Wendy Hartley has been gardening on her Litchfield County property for over 25 years.
  By day she spent her career as a Senior HR Director in financial services — thirty years
  evaluating what works, what doesn't, and when someone is selling you something that
  won't hold up. She brings the same scepticism to garden tools and outdoor furniture.
  She's bought the wrong raised beds, owned two fire pits that rusted within three seasons,
  and finally found a battery mower that handles her lawns without drama. She writes about
  what she actually uses, across real Connecticut seasons.
voice_notes: |
  Direct and evaluative — thirty years in HR means she assesses things quickly and says so.
  Educated but not academic. Uses specific details: brand names, prices, years, measurements.
  Comfortable saying something isn't worth the money and saying why. No gardener-as-mystic
  affectations. Not performing rural lifestyle. The garden is serious to her but she doesn't
  need you to know how serious. Dry wit, occasional impatience with products that overpromise.
  Peer-voice — she assumes the reader is a capable adult.
