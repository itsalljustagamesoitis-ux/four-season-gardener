name = "four-season-gardener"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

# Per-clone verification codes — set in Cloudflare Pages dashboard env vars,
# not here, so they don't carry over to clones.
# Required env vars per clone:
#   AMAZON_TAG              — Amazon Associates tracking ID
#   GA4_ID                  — Google Analytics 4 measurement ID
#   GOOGLE_SITE_VERIFICATION — from Google Search Console HTML tag method
#   BING_SITE_VERIFICATION   — from Bing Webmaster Tools HTML tag method
#   SITE_URL                 — https://yourdomain.com (overrides site.config.yaml)
