<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Green rounded square background -->
  <rect width="32" height="32" rx="6" fill="#2D5016"/>
  <!-- Seedling mark in white, centred -->
  <g transform="translate(16,17)">
    <!-- Stem -->
    <path d="M0,6 Q0.5,0 0,-5" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M0,1 Q-7,-2 -8,-8 Q-3,-5 0,-1Z" fill="#ffffff"/>
    <!-- Right leaf -->
    <path d="M0,-1 Q7,-4 7,-10 Q3,-6 0,-2Z" fill="#ffffff"/>
    <!-- Ground line -->
    <path d="M-6,8 Q0,7 6,8" stroke="#ffffff" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
