<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 40" width="218" height="40" role="img" aria-label="Four Season Gardener">
  <!-- Seedling mark centred at x=18 -->
  <g transform="translate(18,20)">
    <!-- Stem -->
    <path d="M0,10 Q1,2 0,-6" stroke="#2D5016" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M0,2 Q-10,-2 -11,-10 Q-4,-8 0,0Z" fill="#2D5016"/>
    <!-- Right leaf -->
    <path d="M0,0 Q10,-5 10,-13 Q4,-9 0,-2Z" fill="#2D5016"/>
    <!-- Ground line -->
    <path d="M-8,12 Q0,11 8,12" stroke="#2D5016" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Hairline separator -->
  <line x1="44" y1="7" x2="44" y2="33" stroke="#2D5016" stroke-width="0.75" opacity="0.2"/>

  <!-- "FOUR SEASON" — small tracked caps -->
  <text x="53" y="16"
    font-family="Georgia,'Times New Roman',serif"
    font-size="9"
    font-weight="400"
    letter-spacing="3.2"
    fill="#2D5016">FOUR SEASON</text>

  <!-- "Gardener" — heavier, larger -->
  <text x="53" y="34"
    font-family="Georgia,'Times New Roman',serif"
    font-size="16"
    font-weight="700"
    letter-spacing="0.4"
    fill="#2D5016">Gardener</text>
</svg>
